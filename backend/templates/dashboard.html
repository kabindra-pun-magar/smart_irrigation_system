<!DOCTYPE html>
<html>
<head>
    <title>Smart Irrigation System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(-45deg, #0f172a, #1e293b, #0f2027, #203a43);
            background-size: 400% 400%;
            animation: gradientMove 12s ease infinite;
            color: white;
            padding: 40px;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-container {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
        }

        .sensor-card {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            transition: 0.3s;
        }

        .sensor-card:hover {
            transform: translateY(-6px);
        }

        .value {
            font-size: 28px;
            font-weight: bold;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }

        .online {
            background: #22c55e;
            box-shadow: 0 0 10px #22c55e;
        }

        .offline {
            background: red;
            box-shadow: 0 0 10px red;
        }

        .irrigation-glow {
            box-shadow: 0 0 20px #22c55e,
                        0 0 40px #22c55e inset;
        }

        @keyframes waterFlow {
            0% { transform: translateY(0px); opacity: 1; }
            50% { transform: translateY(8px); opacity: 0.6; }
            100% { transform: translateY(0px); opacity: 1; }
        }

        .water-animation {
            font-size: 24px;
            animation: waterFlow 1s infinite;
        }

        .chart-box {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 20px;
            margin-top: 40px;
        }

        .mode-section {
            margin-top: 30px;
            padding: 25px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(15px);
            border-radius: 20px;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="glass-container">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>🌱 Smart Irrigation System</h2>
            <div>
                <span id="connectionDot" class="status-indicator online"></span>
                <span id="connectionText">Connected</span>
            </div>
        </div>

        <!-- SENSOR CARDS -->
        <div class="row g-4">

            <div class="col-md-3">
                <div class="sensor-card">
                    <h6>Temperature</h6>
                    <div id="temp" class="value text-danger">-- °C</div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="sensor-card">
                    <h6>Humidity</h6>
                    <div id="humidity" class="value text-info">-- %</div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="sensor-card">
                    <h6>Soil Moisture</h6>
                    <div id="moisture" class="value text-success">-- %</div>
                </div>
            </div>

            <div class="col-md-3">
                <div id="irrigationCard" class="sensor-card">
                    <h6>Irrigation</h6>
                    <div id="status" class="badge bg-secondary p-2">--</div>
                    <div id="waterIcon" class="mt-2"></div>
                    <div class="small mt-1" id="modeDisplay"></div>
                </div>
            </div>

        </div>

        <!-- MODE SECTION -->
        <div class="mode-section text-center">
            <div class="d-flex justify-content-center align-items-center gap-3">
                <span>AUTO</span>
                <div class="form-check form-switch">
                    <input class="form-check-input"
                           type="checkbox"
                           id="modeToggle"
                           onchange="toggleMode(this.checked)">
                </div>
                <span>MANUAL</span>
            </div>

            <div id="manualButtons" class="mt-4 d-none">
                <button class="btn btn-success m-2" onclick="setManual(1)">
                    💧 Turn ON
                </button>
                <button class="btn btn-danger m-2" onclick="setManual(0)">
                    🌿 Turn OFF
                </button>
            </div>
        </div>

        <!-- CHART -->
        <div class="chart-box">
            <canvas id="chart"></canvas>
        </div>

    </div>

</div>

<!-- SOUND EFFECT -->
<audio id="waterSound">
    <source src="https://www.soundjay.com/nature/water-drip-1.mp3" type="audio/mpeg">
</audio>

<script>

let previousIrrigationState = 0;
let waterSound = document.getElementById("waterSound");

let ctx = document.getElementById("chart").getContext("2d");

let chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [
            {
                label: 'Soil Moisture',
                data: [],
                borderColor: '#22c55e',
                backgroundColor: 'rgba(34,197,94,0.3)',
                tension: 0.4,
                fill: true
            },
            {
                label: 'Temperature',
                data: [],
                borderColor: '#ef4444',
                backgroundColor: 'rgba(239,68,68,0.3)',
                tension: 0.4,
                fill: true
            },
            {
                label: 'Humidity',
                data: [],
                borderColor: '#3b82f6',
                backgroundColor: 'rgba(59,130,246,0.3)',
                tension: 0.4,
                fill: true
            }
        ]
    },
    options: {
        responsive: true,
        animation: {
            duration: 1200,
            easing: 'easeInOutQuart'
        },
        transitions: {
            active: {
                animation: {
                    duration: 800
                }
            }
        },
        scales: {
            y: { beginAtZero: true }
        }
    }
});

function updateDashboard() {

    fetch("/latest")
    .then(res => res.json())
    .then(data => {

        document.getElementById("temp").innerText =
            data.temperature + " °C";

        document.getElementById("humidity").innerText =
            data.humidity + " %";

        document.getElementById("moisture").innerText =
            data.soil_moisture + " %";

        let status = document.getElementById("status");
        let waterIcon = document.getElementById("waterIcon");
        let irrigationCard = document.getElementById("irrigationCard");

        if (data.irrigation_needed == 1) {

            status.className = "badge bg-success p-2";
            status.innerText = "IRRIGATION ON";
            waterIcon.innerHTML =
                "<div class='water-animation'>💧💧💧</div>";
            irrigationCard.classList.add("irrigation-glow");

            if (previousIrrigationState == 0) {
                waterSound.play();
            }

        } else {

            status.className = "badge bg-danger p-2";
            status.innerText = "IRRIGATION OFF";
            waterIcon.innerHTML = "";
            irrigationCard.classList.remove("irrigation-glow");
        }

        previousIrrigationState = data.irrigation_needed;

        document.getElementById("modeDisplay").innerHTML =
            "Mode: <b>" + data.mode + "</b>";

        let isManual = (data.mode === "MANUAL");

        document.getElementById("modeToggle").checked = isManual;
        document.getElementById("manualButtons")
            .classList.toggle("d-none", !isManual);

        let time = new Date().toLocaleTimeString();

        chart.data.labels.push(time);
        chart.data.datasets[0].data.push(data.soil_moisture);
        chart.data.datasets[1].data.push(data.temperature);
        chart.data.datasets[2].data.push(data.humidity);

        if (chart.data.labels.length > 10) {
            chart.data.labels.shift();
            chart.data.datasets.forEach(ds => ds.data.shift());
        }

        chart.update();
    });
}

function toggleMode(isManual) {
    fetch("/set_mode", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({mode:isManual ? "MANUAL" : "AUTO"})
    });
}

function setManual(state) {
    fetch("/set_manual", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({state:state})
    });
}

setInterval(updateDashboard, 3000);

</script>

</body>
</html>
